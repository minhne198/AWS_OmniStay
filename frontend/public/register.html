<body class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-5xl bg-white/95 rounded-2xl shadow-2xl overflow-hidden">
        <div class="grid md:grid-cols-2">
            <div class="p-8 md:p-12 bg-gradient-to-br from-booking-blue to-primary">
                <p class="text-label-sm font-label-sm text-highlight-gold uppercase tracking-wider mb-2">AWS OmniStay</p>
                <h1 class="text-display-lg font-display-lg text-white mb-4">Tạo tài khoản mới</h1>
                <p class="text-body-lg font-body-lg text-white/90">Bắt đầu hành trình đặt phòng của bạn với OmniStay.</p>
            </div>
            <div class="p-8 md:p-12">
                <div class="space-y-6">
                    <form id="registerForm" class="space-y-4">
                        <div class="space-y-3">
                            <label class="block">
                                <span class="text-label-md font-label-md text-on-surface-variant block mb-1">Họ tên</span>
                                <input id="registerName" class="w-full px-4 py-3 border border-outline-variant rounded-lg bg-surface-container-lowest focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" required />
                            </label>
                            <label class="block">
                                <span class="text-label-md font-label-md text-on-surface-variant block mb-1">Email</span>
                                <input id="registerEmail" type="email" class="w-full px-4 py-3 border border-outline-variant rounded-lg bg-surface-container-lowest focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" required />
                            </label>
                            <label class="block">
                                <span class="text-label-md font-label-md text-on-surface-variant block mb-1">Mật khẩu</span>
                                <input id="registerPassword" type="password" class="w-full px-4 py-3 border border-outline-variant rounded-lg bg-surface-container-lowest focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" minlength="6" required />
                            </label>
                            <label class="block">
                                <span class="text-label-md font-label-md text-on-surface-variant block mb-1">Nhập lại mật khẩu</span>
                                <input id="registerPasswordConfirm" type="password" class="w-full px-4 py-3 border border-outline-variant rounded-lg bg-surface-container-lowest focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" minlength="6" required />
                            </label>
                            <label class="block">
                                <span class="text-label-md font-label-md text-on-surface-variant block mb-1">Vai trò</span>
                                <select id="registerRole" class="w-full px-4 py-3 border border-outline-variant rounded-lg bg-surface-container-lowest focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" required>
                                    <option value="Customer">Khách đặt phòng</option>
                                    <option value="HotelOwner">Chủ khách sạn</option>
                                </select>
                            </label>
                        </div>
                        <button type="submit" class="w-full bg-action-blue hover:bg-primary-container text-white font-label-md text-label-md px-6 py-3 rounded-lg transition-colors">Đăng ký</button>
                    </form>

                    <div class="flex items-center justify-center gap-2">
                        <span class="text-body-md text-on-surface-variant">Đã có tài khoản?</span>
                        <a href="index.html" class="text-primary font-label-md text-label-md hover:underline">Đăng nhập</a>
                    </div>

                    <div id="authMessage" class="mt-4"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="./config.js?v=20260713-upload400fix"></script>
    <script src="../src/api.js?v=20260713-upload400fix"></script>
    <script src="../src/session.js?v=20260713-upload400fix"></script>
    <script>
        (function () {
            const api = window.OmniStayApi;
            const ui = window.OmniStaySession;
            const params = new URLSearchParams(window.location.search);

            ui.redirectIfAuthenticated();

            const registerForm = document.getElementById('registerForm');
            const message = document.getElementById('authMessage');

            registerForm.addEventListener('submit', async (event) => {
                event.preventDefault();
                const name = document.getElementById('registerName').value;
                const email = document.getElementById('registerEmail').value;
                const password = document.getElementById('registerPassword').value;
                const passwordConfirm = document.getElementById('registerPasswordConfirm').value;
                const role = document.getElementById('registerRole').value;

                if (password !== passwordConfirm) {
                    ui.renderMessage(message, 'Mật khẩu nhập lại không khớp.', 'error');
                    return;
                }

                ui.renderMessage(message, 'Đang tạo tài khoản...', 'muted');

                try {
                    const auth = await api.register({
                        fullName: name,
                        email: email,
                        password: password,
                        role: role
                    });
                    api.setSession(auth);
                    window.location.replace('home.html');
                } catch (error) {
                    ui.renderMessage(message, error.message, 'error');
                }
            });
        })();
    </script>
