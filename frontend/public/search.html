<body class="bg-background text-on-background font-body-md text-body-md antialiased flex flex-col min-h-screen">
<!-- TopNavBar -->
<header class="bg-booking-blue border-b border-outline-variant shadow-sm sticky top-0 z-50">
    <div class="flex justify-between items-center w-full px-margin-desktop h-16 max-w-[1280px] mx-auto">
        <div class="flex items-center gap-8">
            <a class="text-headline-md font-headline-md font-bold text-on-primary hover:opacity-80 transition-opacity" href="home.html">OmniStay</a>
            <nav class="hidden md:flex gap-6 items-center h-full">
                <a class="text-on-primary hover:text-highlight-gold transition-colors hover:bg-primary-container px-3 py-2 rounded" href="home.html" data-nav="home">Trang chủ</a>
                <a class="text-on-primary hover:text-highlight-gold transition-colors hover:bg-primary-container px-3 py-2 rounded" href="search.html" data-nav="search">Tìm phòng</a>
                <a class="text-on-primary hover:text-highlight-gold transition-colors hover:bg-primary-container px-3 py-2 rounded" href="booking-lookup.html" data-nav="bookings">Booking của tôi</a>
                <a class="text-on-primary hover:text-highlight-gold transition-colors hover:bg-primary-container px-3 py-2 rounded" href="system-status.html" data-nav="status">System status</a>
                <a class="text-on-primary hover:text-highlight-gold transition-colors hover:bg-primary-container px-3 py-2 rounded" href="admin.html" data-nav="admin" data-nav-admin hidden>Admin</a>
            </nav>
        </div>
        <div class="flex items-center gap-4">
            <a class="px-3 py-2 bg-white/10 rounded-lg text-white text-sm font-semibold hover:bg-white/20 transition-colors" href="profile.html" data-profile-link>Trang cá nhân</a>
            <span class="px-3 py-2 bg-white/10 rounded-lg text-white text-sm font-semibold max-w-[200px] truncate" data-session-name>...</span>
            <button class="text-on-primary hover:bg-primary-container transition-all p-2 rounded-full" type="button" data-logout>
                <span class="material-symbols-outlined">logout</span>
            </button>
        </div>
    </div>
</header>
<main class="flex-grow py-8 px-margin-mobile md:px-margin-desktop">
    <div class="max-w-[1280px] mx-auto">
        <div class="mb-8 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
            <div>
                <p class="text-label-sm font-label-sm text-outline uppercase tracking-wider mb-2">Kết quả</p>
                <h1 class="text-headline-lg font-headline-lg text-on-surface">Phòng còn trống</h1>
                <p id="searchSummary" class="text-body-md text-on-surface-variant mt-2">...</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-gutter">
            <!-- Sidebar Filter -->
            <aside class="lg:col-span-1">
                <div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-6 sticky top-24">
                    <form id="searchForm">
                        <div class="space-y-4">
                            <label class="block">
                                <span class="text-label-md font-label-md text-on-surface-variant block mb-1">Thành phố</span>
                                <select id="city" class="w-full px-4 py-3 border border-outline-variant rounded-lg bg-surface-container-lowest focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all"></select>
                            </label>
                            <label class="block">
                                <span class="text-label-md font-label-md text-on-surface-variant block mb-1">Tên khách sạn/phòng</span>
                                <input id="keyword" class="w-full px-4 py-3 border border-outline-variant rounded-lg bg-surface-container-lowest focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" placeholder="VD: Sunrise, Deluxe" />
                            </label>
                            <label class="block">
                                <span class="text-label-md font-label-md text-on-surface-variant block mb-1">Điểm đánh giá tối thiểu</span>
                                <select id="minRating" class="w-full px-4 py-3 border border-outline-variant rounded-lg bg-surface-container-lowest focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all">
                                    <option value="">Tất cả điểm</option>
                                    <option value="5">5 sao</option>
                                    <option value="4">Từ 4 sao</option>
                                    <option value="3">Từ 3 sao</option>
                                </select>
                            </label>
                            <label class="block">
                                <span class="text-label-md font-label-md text-on-surface-variant block mb-1">Sắp xếp</span>
                                <select id="sortBy" class="w-full px-4 py-3 border border-outline-variant rounded-lg bg-surface-container-lowest focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all">
                                    <option value="price">Giá thấp trước</option>
                                    <option value="price_desc">Giá cao trước</option>
                                    <option value="rating">Điểm cao trước</option>
                                </select>
                            </label>
                            <label class="block">
                                <span class="text-label-md font-label-md text-on-surface-variant block mb-1">Nhận phòng</span>
                                <input id="checkIn" type="date" class="w-full px-4 py-3 border border-outline-variant rounded-lg bg-surface-container-lowest focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" required />
                            </label>
                            <label class="block">
                                <span class="text-label-md font-label-md text-on-surface-variant block mb-1">Trả phòng</span>
                                <input id="checkOut" type="date" class="w-full px-4 py-3 border border-outline-variant rounded-lg bg-surface-container-lowest focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" required />
                            </label>
                            <label class="block">
                                <span class="text-label-md font-label-md text-on-surface-variant block mb-1">Số khách</span>
                                <input id="guests" type="number" min="1" max="20" class="w-full px-4 py-3 border border-outline-variant rounded-lg bg-surface-container-lowest focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" required />
                            </label>
                            <button type="submit" class="w-full bg-action-blue hover:bg-primary-container text-white font-label-md text-label-md px-6 py-3 rounded-lg transition-colors">Tìm lại</button>
                        </div>
                    </form>
                </div>
            </aside>
            <!-- Results List -->
            <section class="lg:col-span-3">
                <div class="mb-6">
                    <div class="flex items-center gap-4">
                        <p class="text-label-sm font-label-sm text-outline uppercase tracking-wider">Danh sách</p>
                        <h2 class="text-headline-md font-headline-md text-on-surface"><span id="resultsCount">0</span> phòng phù hợp</h2>
                    </div>
                </div>
                <div id="resultsList" class="space-y-4"></div>
            </section>
        </div>
    </div>
</main>
<!-- Footer -->
<footer class="bg-surface-container-highest border-t border-outline-variant w-full py-8 px-margin-desktop mt-auto flex flex-col md:flex-row justify-between items-center gap-4">
    <div class="flex items-center">
        <span class="text-body-lg font-headline-md text-primary font-bold">OmniStay</span>
    </div>
    <div class="flex flex-wrap gap-6 justify-center">
        <a class="text-on-surface-variant hover:text-primary hover:underline decoration-primary text-label-sm font-label-sm transition-colors" href="home.html">Trang chủ</a>
        <a class="text-on-surface-variant hover:text-primary hover:underline decoration-primary text-label-sm font-label-sm transition-colors" href="search.html">Tìm phòng</a>
        <a class="text-on-surface-variant hover:text-primary hover:underline decoration-primary text-label-sm font-label-sm transition-colors" href="system-status.html">System status</a>
    </div>
    <div>
        <span class="text-body-sm font-body-sm text-on-surface-variant">© 2024 AWS OmniStay. All rights reserved.</span>
    </div>
</footer>

<script src="../src/session.js?v=20260713-upload400fix"></script>
<script src="../src/search.js?v=20260713-upload400fix"></script>
</body>
</html>
